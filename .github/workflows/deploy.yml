name: Deploy Admin

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  ECR_REPO: gumite-admin
  ECS_CLUSTER: gumite-production-cluster
  ECS_SERVICE: gumite-production-admin

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          TAG="${REGISTRY}/${ECR_REPO}:${SHORT_SHA}"
          LATEST="${REGISTRY}/${ECR_REPO}:latest"

          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://api.gumite.com" \
            --build-arg NEXT_PUBLIC_WS_URL="wss://api.gumite.com" \
            -t "$TAG" -t "$LATEST" .

          docker push "$TAG"
          docker push "$LATEST"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
          echo "Deployment complete"
